<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Modern Indigo-to-Cyan premium gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="48" height="48" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#090d16" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background base container -->
  <rect width="48" height="48" rx="12" fill="url(#bg-grad)"/>

  <!-- Isometric grid lines representing site layout plots -->
  <path d="M12 28L24 21L36 28L24 35Z" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3"/>
  <path d="M18 24.5L24 21L30 24.5" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3"/>
  <path d="M24 35V21" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- High-contrast central location pin and building combo -->
  <path d="M24 9C19.5 9 16 12.5 16 17C16 22.5 24 30 24 30C24 30 32 22.5 32 17C32 12.5 28.5 9 24 9Z" fill="#ffffff" filter="url(#shadow)"/>
  
  <!-- House cutout in the center of the pin -->
  <path d="M24 13L20 17H22V21H26V17H28L24 13Z" fill="url(#bg-grad)"/>
</svg>